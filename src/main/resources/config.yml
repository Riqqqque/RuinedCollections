storage:
  # sqlite is best for small servers. mysql is better for large servers and networks.
  type: sqlite
  table-prefix: rc_
  sqlite:
    file: data.db
  mysql:
    host: localhost
    port: 3306
    database: minecraft
    username: root
    password: ''
    use-ssl: false
    pool-size: 10

progress:
  flush-interval-seconds: 15
  load-on-join: true
  save-on-quit: true

diagnostics:
  # Writes detailed plugin diagnostics to plugins/RuinedCollections/logs/diagnostics.log.
  enabled: true
  file: logs/diagnostics.log
  mirror-warnings-to-console: true
  include-stack-traces: true
  max-file-size-mb: 8
  max-archives: 5
  debug:
    # Leave these off unless you are actively debugging. Tracking can be noisy on busy servers.
    tracking-skips: false
    progress: false
    rewards: false
    commands: false

leaderboards:
  # PlaceholderAPI leaderboard placeholders are served from this cache.
  enabled: true
  refresh-interval-seconds: 60
  entries-per-collection: 10
  rank-cache-seconds: 30
  empty-name: '-'
  empty-value: '0'
  loading-value: '...'
  unknown-name-format: 'Unknown-%short_uuid%'

tracking:
  ignore-creative: true
  ignore-spectator: true
  ignore-player-placed-blocks: true
  disabled-worlds: []
  enabled-worlds: []

menus:
  main-title: '&8Collections'
  detail-title: '&8%collection%'
  previous-item: ARROW
  next-item: ARROW
  back-item: BARRIER

messages:
  prefix: '&8[&6RuinedCollections&8]&r '
  no-permission: '&cYou do not have permission.'
  player-only: '&cOnly players can use that.'
  reloaded: '&aReloaded %collections% collections.'
  invalid-collection: '&cUnknown collection: &f%collection%'
  invalid-number: '&cThat amount is not valid.'
  progress-added: '&aAdded &f%amount% &ato &f%player%&a in &f%collection%&a.'
  progress-set: '&aSet &f%player%&a to &f%amount%&a in &f%collection%&a.'
  progress-reset: '&aReset &f%player%&a in &f%collection%&a.'
  tier-unlocked: '&aCollection unlocked: &f%collection% %tier%&a!'
